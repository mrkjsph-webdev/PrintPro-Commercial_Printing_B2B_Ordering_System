<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Customization</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <style>
      body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #eef7ff;
        color: #0f172a;
      }
      .header-bar {
        background-color: #1d4ed8;
        color: #fff;
      }
      .header-bar .brand-title {
        font-weight: 700;
        letter-spacing: 0.02em;
      }
      .header-bar .profile-label {
        font-size: 0.82rem;
        color: rgba(255, 255, 255, 0.8);
      }
      .header-bar .btn-logout {
        border-color: rgba(255, 255, 255, 0.7);
        color: #fff;
      }
      .header-bar .btn-logout:hover {
        background-color: rgba(255, 255, 255, 0.1);
      }
      .page-title {
        font-size: 2rem;
        font-weight: 700;
        color: #1d4ed8;
      }
      .card-panel {
        border-radius: 1.5rem;
        border: 1px solid rgba(15, 23, 42, 0.08);
        background-color: #fff;
      }
      .back-link {
        font-weight: 600;
        color: #0f172a;
      }
      .main-preview {
        border: 3px solid #2563eb;
        border-radius: 1.5rem;
        min-height: 420px;
        background-color: #ffffff;
        padding: 1rem;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .main-preview img {
        width: 100%;
        height: auto;
        object-fit: cover;
        border-radius: 1rem;
      }
      .thumb-card {
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 1rem;
        padding: 0.5rem;
        background-color: #fff;
      }
      .thumb-card img {
        border-radius: 0.8rem;
      }
      .section-title {
        font-weight: 700;
        color: #1e3a8a;
      }
      .field-label {
        font-size: 0.85rem;
        font-weight: 700;
        color: #0f172a;
      }
      .spec-field .form-control,
      .spec-field .form-select {
        background-color: #f1f5f9;
        border: 1px solid #cbd5e1;
      }
      .price-box .form-control {
        background-color: #f1f5f9;
        border: 1px solid #cbd5e1;
      }
      .info-box {
        border: 1px solid rgba(15, 23, 42, 0.12);
        border-radius: 1rem;
        padding: 1rem;
        background-color: #fff;
      }
      .info-box strong {
        display: block;
        margin-bottom: 0.5rem;
      }
      .btn-add {
        background-color: #fb923c;
        border-color: #fb923c;
      }
      .btn-add:hover {
        background-color: #f97316;
        border-color: #f97316;
      }
    </style>
  </head>
  <body>
    <header class="header-bar py-3 shadow-sm">
      <div class="container d-flex align-items-center justify-content-between flex-wrap gap-3">
        <div class="brand-title">PrintPro</div>
        <div class="d-flex align-items-center gap-3">
          <div class="text-end">
            <div class="profile-label">PROFILE</div>
          </div>
          <button class="btn btn-outline-light btn-sm btn-logout">LOGOUT</button>
        </div>
      </div>
    </header>

    <main class="container py-5">
      <div class="row justify-content-center mb-4">
        <div class="col-lg-10 text-center">
          <h1 class="page-title">Product Customization</h1>
        </div>
      </div>
      <div class="row g-4">
        <div class="col-lg-8">
          <div class="card-panel shadow-sm p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <a href="#" class="back-link text-decoration-none">← Back</a>
            </div>
            <div class="row g-4">
              <div class="col-md-3 d-none d-md-flex flex-column gap-3">
                <div class="thumb-card">
                  <img src="https://via.placeholder.com/120" alt="Thumbnail 1" class="img-fluid" />
                </div>
                <div class="thumb-card">
                  <img src="https://via.placeholder.com/120" alt="Thumbnail 2" class="img-fluid" />
                </div>
                <div class="thumb-card">
                  <img src="https://via.placeholder.com/120" alt="Thumbnail 3" class="img-fluid" />
                </div>
                <div class="thumb-card">
                  <img src="https://via.placeholder.com/120" alt="Thumbnail 4" class="img-fluid" />
                </div>
              </div>
              <div class="col-md-9">
                <div class="main-preview">
                  <img src="https://images.unsplash.com/photo-1512453979798-5ea266f8880c?auto=format&fit=crop&w=1000&q=80" alt="Product Preview" />
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-lg-4">
          <div class="card-panel shadow-sm p-4 h-100 d-flex flex-column justify-content-between">
            <div>
              <h2 class="section-title mb-3">Product Specifications</h2>
              <div class="spec-field mb-3">
                <label class="field-label" for="paperSize">Paper Size</label>
                <select id="paperSize" class="form-select" disabled>
                  <option selected>0</option>
                </select>
              </div>
              <div class="spec-field mb-3">
                <label class="field-label" for="gsm">GSM</label>
                <select id="gsm" class="form-select" disabled>
                  <option selected>0</option>
                </select>
              </div>
              <div class="spec-field mb-3">
                <label class="field-label" for="paperTexture">Paper Texture</label>
                <select id="paperTexture" class="form-select" disabled>
                  <option selected>0</option>
                </select>
              </div>
              <div class="spec-field mb-3">
                <label class="field-label" for="copies">Copies</label>
                <select id="copies" class="form-select" disabled>
                  <option selected>0</option>
                </select>
              </div>
              <div class="price-box mb-4">
                <label class="field-label" for="price">Price</label>
                <input id="price" class="form-control" type="text" value="₱0" readonly />
              </div>
              <div class="info-box mb-4">
                <strong>Pickup Delivery Only</strong>
                <p class="text-muted mb-0">Orders must pickup at the same day when order is completed.</p>
              </div>
            </div>
            <div class="d-grid mt-3">
              <button class="btn btn-add btn-lg py-3">ADD TO CART</button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-3pVhceE6RecxFaVDYGtJjYQlZb1GDwfI2fK7Axn5BkF1Zb7L4d2FV6EQGnp8SxnQ" crossorigin="anonymous"></script>
  </body>
</html>
