<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="order-style.css">
</head>

<body>
    <!-- Navigation content of the cart layout -->
    <header>
        <nav class="navigation">
            <ul class="d-flex align-items-center w-100">
                <!-- Logo -->
                <li class="me-2">
                    <img src="image_resources/logo.png" alt="Logo">
                </li>

                <!-- Company Logo -->
                <li class="me-auto">PrintPro</li>

                <!-- Home icon -->
                <li class="list">
                    <a href="#"><img src="image_resources/home-btn.png" alt="Home"></a>
                </li>

                <!-- User icon -->
                <li class="list">
                    <a href="#"><img src="image_resources/user-btn.png" alt="User"></a>
                </li>

                <!-- Menu dropdown -->
                <li class="dropdown list">
                    <a href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <img src="image_resources/menu-btn.png" alt="Menu">
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <a class="dropdown-item d-flex align-items-center gap-2" href="#">
                                <img src="image_resources/logout-btn.png" alt="Logout" height="16">
                                Logout
                            </a>
                        </li>
                    </ul>
                </li>

            </ul>

        </nav>
    </header>

    <!-- Main content of the cart layout -->
    <main>
        <section>
            <!-- Cart section -->
            <div class="cart-container">
                <div class="cart-items">
                    <h4>My Cart</h4>

                    <!-- Scrollable Cart Container -->
                    <div class="container">
                        <div class="overflow-auto" style="max-height: 400px;">

                            <!-- Cart Items Here After User Adds Products -->
                            <div class="card mb-3" style="max-width: 540px;">
                                <div class="row g-0">
                                    <!-- Image -->
                                    <div class="col-md-4">
                                        <img src="image_resources/The Golden Era Magazine.png"
                                            class="img-fluid rounded-start" alt="...">
                                    </div>

                                    <!-- Cards -->
                                    <div class="col-md-8">
                                        <div class="card-body d-flex justify-content-between align-items-center">
                                            <!-- Left side: product text -->
                                            <div>
                                                <h5 class="card-title mb-1">Product Name</h5>
                                                <p class="card-text mb-1">₱0.00</p>
                                                <p class="card-text"><small class="text-body-secondary">₱0.00</small>
                                                </p>
                                                <button class="btn btn-secondary btn-sm" data-bs-toggle="modal"
                                                    data-bs-target="#editModal1"> Edit </button>
                                            </div>

                                            <!-- Right side: checkbox + delete -->
                                            <div class="d-flex align-items-center gap-2">
                                                <input type="checkbox" class="form-check-input">
                                                <button class="btn btn-danger btn-sm p-1">
                                                    <img src="image_resources/delete-icon.png" alt="Delete"
                                                        style="width:16px; height:16px;">
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <!-- Cart Items Here After User Adds Products -->
                            <div class="card mb-3" style="max-width: 540px;">
                                <div class="row g-0">
                                    <!-- Image -->
                                    <div class="col-md-4">
                                        <img src="image_resources/The Golden Era Magazine.png"
                                            class="img-fluid rounded-start" alt="...">
                                    </div>

                                    <!-- Cards -->
                                    <div class="col-md-8">
                                        <div class="card-body d-flex justify-content-between align-items-center">
                                            <!-- Left side: product text -->
                                            <div>
                                                <h5 class="card-title mb-1">Product Name</h5>
                                                <p class="card-text mb-1">₱0.00</p>
                                                <p class="card-text"><small class="text-body-secondary">₱0.00</small>
                                                </p>
                                                <button class="btn btn-secondary btn-sm" data-bs-toggle="modal"
                                                    data-bs-target="#editModal1"> Edit </button>
                                            </div>

                                            <!-- Right side: checkbox + delete -->
                                            <div class="d-flex align-items-center gap-2">
                                                <input type="checkbox" class="form-check-input">
                                                <button class="btn btn-danger btn-sm p-1">
                                                    <img src="image_resources/delete-icon.png" alt="Delete"
                                                        style="width:16px; height:16px;">
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <!-- Cart Items Here After User Adds Products -->
                            <div class="card mb-3" style="max-width: 540px;">
                                <div class="row g-0">
                                    <!-- Image -->
                                    <div class="col-md-4">
                                        <img src="image_resources/The Golden Era Magazine.png"
                                            class="img-fluid rounded-start" alt="...">
                                    </div>

                                    <!-- Cards -->
                                    <div class="col-md-8">
                                        <div class="card-body d-flex justify-content-between align-items-center">
                                            <!-- Left side: product text -->
                                            <div>
                                                <h5 class="card-title mb-1">Product Name</h5>
                                                <p class="card-text mb-1">₱0.00</p>
                                                <p class="card-text"><small class="text-body-secondary">₱0.00</small>
                                                </p>
                                                <button class="btn btn-secondary btn-sm" data-bs-toggle="modal"
                                                    data-bs-target="#editModal1"> Edit </button>
                                            </div>

                                            <!-- Right side: checkbox + delete -->
                                            <div class="d-flex align-items-center gap-2">
                                                <input type="checkbox" class="form-check-input">
                                                <button class="btn btn-danger btn-sm p-1">
                                                    <img src="image_resources/delete-icon.png" alt="Delete"
                                                        style="width:16px; height:16px;">
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="card mb-3" style="max-width: 540px;">
                                <div class="row g-0">
                                    <!-- Image -->
                                    <div class="col-md-4">
                                        <img src="image_resources/The Golden Era Magazine.png"
                                            class="img-fluid rounded-start" alt="...">
                                    </div>

                                    <!--Cards -->
                                    <div class="col-md-8">
                                        <div class="card-body d-flex justify-content-between align-items-center">
                                            <!-- Left side: product text -->
                                            <div>
                                                <h5 class="card-title mb-1">Product Name</h5>
                                                <p class="card-text mb-1">₱0.00</p>
                                                <p class="card-text"><small class="text-body-secondary">₱0.00</small>
                                                </p>
                                                <button class="btn btn-secondary btn-sm" data-bs-toggle="modal"
                                                    data-bs-target="#editModal1"> Edit </button>
                                            </div>

                                            <!-- Right side: checkbox + delete -->
                                            <div class="d-flex align-items-center gap-2">
                                                <input type="checkbox" class="form-check-input">
                                                <button class="btn btn-danger btn-sm p-1">
                                                    <img src="image_resources/delete-icon.png" alt="Delete"
                                                        style="width:16px; height:16px;">
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <hr>
                    <!-- Placeholder for the select/unselect all checkbox, which will allow users to easily select or deselect all items in the cart for checkout or removal -->
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="" id="checkDefault">
                        <label class="form-check-label" for="checkDefault"> Select/Unselect All </label>
                    </div>
                </div>

                <!-- Order Summary section -->
                <div class="order-summary">
                    <h4>Order Summary</h4>

                    <table class="tables">
                        <tr>
                            <td>Quantity:</td>
                            <td><b>0</b></td>
                        </tr>
                        <tr>
                            <td>Subtotal:</td>
                            <td><b>₱0.00</b></td>
                        </tr>
                        <tr>
                            <td>Discount:</td>
                            <td><b>₱0.00</b></td>
                        </tr>
                        <tr>
                            <td>Total:</td>
                            <td><b>₱0.00</b></td>
                        </tr>
                    </table>
                    <div class="space"></div>
                    <hr> <!-- Horizontal line --->
                    <div class="space"></div>

                    <div class="d-grid gap-2 col-6 mx-auto">
                        <!-- Placeholder for the checkout button, which will be enabled when items are added to the cart -->
                        <a href="order-checkout.html" class="btn btn-secondary" tabindex="-1" role="button">Checkout</a>
                    </div>
                </div>
            </div>

            <!-- Modal for editing product specifications -->
            <div class="modal fade" id="editModal1" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Edit Product Specifications</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <!-- Customization form -->
                            <label>Paper Size:</label>
                            <select class="form-select">
                                <option>A4</option>
                                <option>A3</option>
                                <option>Letter</option>
                            </select>

                            <label class="mt-2">Texture:</label>
                            <select class="form-select">
                                <option>Glossy</option>
                                <option>Matte</option>
                            </select>

                            <label class="mt-2">GSM:</label>
                            <input type="number" class="form-control" value="30">

                            <label class="mt-2">Quantity:</label>
                            <input type="number" class="form-control" value="1">
                        </div>
                        <div class="modal-footer">
                            <button class="btn btn-primary">Save Changes</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </main>
</body>

</html>
