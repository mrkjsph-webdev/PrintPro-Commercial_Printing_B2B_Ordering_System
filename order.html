<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PrintPro Orders</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

<link rel="stylesheet" href="order.css">

</head>
<body>

<div class="d-flex">

    <div class="sidebar p-3">
        <div class="logo">
            <img src="logo.png" width="30" alt="">
            PrintPro
        </div>

        <nav class="nav flex-column mt-4">
            <a href="admin_dash.html" class="nav-link active">
                <span class="material-symbols-outlined">home</span> Dashboard
            </a>
            <a href="admin_users.html" class="nav-link">
                <span class="material-symbols-outlined">person</span> Users
            </a>
            <a href="admin_orders.html" class="nav-link">
                <span class="material-symbols-outlined">shopping_cart</span> Orders
            </a>
            <a href="admin_inventory.html" class="nav-link">
                <span class="material-symbols-outlined">inventory_2</span> Inventory
            </a>
            <a href="analytics.html" class="nav-link">
                <span class="material-symbols-outlined">analytics</span> Report and Analytics
            </a>
        </nav>
    </div>

    <div class="content flex-grow-1 p-4">

        <h3 class="mb-4">Orders</h3>

        <div class="search-bar mb-4 d-flex">
            <input type="text" class="form-control" placeholder="Search orders...">
            <button class="btn btn-light ms-2">🔍</button>
        </div>

        <div class="orders-box">

            <div class="order-item d-flex align-items-center">
                <img src="https://via.placeholder.com/80" class="order-img">

                <div class="ms-3 flex-grow-1">
                    <h6 class="mb-1">Premium Posters</h6>
                    <small class="text-muted">2026-0418JR045</small><br>
                    <small class="text-muted">September 5, 2026</small>
                </div>

                <span class="status processing">Processing</span>

                <button class="btn btn-primary btn-sm ms-3">View Order</button>
            </div>

            <div class="order-item d-flex align-items-center">
                <img src="https://via.placeholder.com/80" class="order-img">

                <div class="ms-3 flex-grow-1">
                    <h6 class="mb-1">Flyers</h6>
                    <small class="text-muted">2026-0418JR045</small><br>
                    <small class="text-muted">September 5, 2026</small>
                </div>

                <span class="status pending">Pending</span>

                <button class="btn btn-primary btn-sm ms-3">View Order</button>
            </div>

            <div class="order-item d-flex align-items-center">
                <img src="https://via.placeholder.com/80" class="order-img">

                <div class="ms-3 flex-grow-1">
                    <h6 class="mb-1">Postcard</h6>
                    <small class="text-muted">2026-0917EQR23</small><br>
                    <small class="text-muted">June 2, 2026</small>
                </div>

                <span class="status pending">Pending</span>

                <button class="btn btn-primary btn-sm ms-3">View Order</button>
            </div>

        </div>

    </div>
</div>

</body>
</html>
