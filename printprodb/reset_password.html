<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Reset Password</title>
  <link rel="stylesheet" href="reset-password.css">
</head>

<body>

  <div class="container">
    <h2>RESET PASSWORD</h2>
    <p>
      Enter your new password and confirm your new password<br>
      by re-entering it.
    </p>

    <form action="resetpass.php" method="post">

      <div class="input-group">
        <input type="email" name="email" placeholder="Email" required>
      </div>

      <div class="input-group">
        <input type="password" name="new_password" id="newPassword" placeholder="New Password" required>
      </div>

      <div class="input-group">
        <input type="password" name="confirm_password" id="confirmPassword" placeholder="Confirm New Password" required>
      </div>

      <button type="submit">RESET PASSWORD</button>

    </form>
  </div>

  <script>
    function togglePassword() {
      const pass1 = document.getElementById("newPassword");
      const pass2 = document.getElementById("confirmPassword");

      const type = pass1.type === "password" ? "text" : "password";
      pass1.type = type;
      pass2.type = type;
    }
    const params = new URLSearchParams(window.location.search);

    if (params.get("reset") === "success") {
      alert("Password successfully reset!");
    }
  </script>

</body>

</html>
