<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reset Password</title>
  <link rel="stylesheet" href="reset-password.css">
</head>
<body>

  <div class="container">
    <h2>RESET PASSWORD</h2>
    <p>
      Enter your new password and confirm your new password<br>
      by re-entering it.
    </p>

    <div class="input-group">
      <input type="email" placeholder="Email" required>
    </div>

    <div class="input-group">
      <input type="password" id="newPassword" placeholder="New Password" required>
    </div>

    <div class="input-group">
      <input type="password" id="confirmPassword" placeholder="Confirm New Password" required>
    </div>

    <div class="show-password">
      <input type="checkbox" id="showPass" onclick="togglePassword()">
      <label for="showPass">Show Password</label>
    </div>

    <button type="button" onclick="window.location.href='login.html'">RESET PASSWORD</button>
  </div>

  <script>
    function togglePassword() {
      const pass1 = document.getElementById("newPassword");
      const pass2 = document.getElementById("confirmPassword");

      const type = pass1.type === "password" ? "text" : "password";
      pass1.type = type;
      pass2.type = type;
    }
  </script>

</body>
</html>
