<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Reset Password</title>
  <link rel="stylesheet" href="reset-password.css">
</head>

<body>

  <div class="container">
    <h2>RESET PASSWORD</h2>
    <p>
      Enter your new password and confirm your new password
      by re-entering it.
    </p>

    <form action="resetpass.php" method="post" class="reset-form" novalidate>

      <div class="input-group">
        <input type="email" name="email" placeholder="Email" required>
        <div class="invalid-feedback">
          Please provide a valid email.
        </div>
      </div>

      <div class="input-group">
        <input type="password" id="newPassword" name="newPassword" placeholder="New Password" required>
        <div class="invalid-feedback">
          Please enter a new password.
        </div>
      </div>

      <div class="input-group">
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm New Password" required>
        <div class="invalid-feedback" id="confirmError">
          Please confirm your password.
        </div>
      </div>

      <div class="show-password">
        <input type="checkbox" id="showPass">
        <label for="showPass">Show Password</label>
      </div>

      <button type="submit">RESET PASSWORD</button>

    </form>
  </div>

  <script>
    const form = document.querySelector('.reset-form');
    const newPass = document.getElementById("newPassword");
    const confirmPass = document.getElementById("confirmPassword");
    const confirmError = document.getElementById("confirmError");

    form.addEventListener('submit', function (event) {

      // HTML validation
      if (!form.checkValidity()) {
        event.preventDefault();
        event.stopPropagation();
        form.classList.add('was-validated');
        return;
      }

      // Custom validation: password match
      if (newPass.value !== confirmPass.value) {
        event.preventDefault();
        form.classList.add('was-validated');
        confirmError.textContent = "Passwords do not match.";
        confirmPass.classList.add('is-invalid');
        return;
      }

      // success (temporary redirect)
      window.location.href = "login.html";
    });

    // Show password toggle
    const showPass = document.getElementById("showPass");

    showPass.addEventListener('change', function () {
      const type = this.checked ? "text" : "password";
      newPass.type = type;
      confirmPass.type = type;
    });
  </script>

</body>

</html>
