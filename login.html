<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Login Page</title>
  <link rel="stylesheet" href="login.css">
</head>

<body>

  <a href="index.html" class="back">← Back</a>

  <div class="container">
    <h2>WELCOME BACK!</h2>
    <p>Login to your account.</p>

    <form class="needs-validation" novalidate>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" required class="form-control">
        <div class="invalid-feedback">
          Please provide a valid email.
        </div>
      </div>

      <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" required class="form-control">
        <div class="invalid-feedback">
          Please provide a valid password.
        </div>
      </div>

      <div class="options">
        <div class="show-password">
          <input type="checkbox" id="showPassword">
          <label for="showPassword">Show Password</label>
        </div>
        <a href="reset_password.html">Forgot Password?</a>
      </div>

      <!-- FIX: Button inside form -->
      <button type="submit">LOGIN</button>

      <div class="register">
        Don't have an account?
        <a href="sign_in.html">Register here</a>
      </div>

    </form>
  </div>

  <script>
    const form = document.querySelector('.needs-validation');

    form.addEventListener('submit', function (event) {
      event.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      // Check HTML validation first
      if (!form.checkValidity()) {
        form.classList.add('was-validated');
        return;
      }

      const adminEmail = "admin";
      const adminPassword = "admin123";

      if (email === adminEmail && password === adminPassword) {
        window.location.href = "admin_dashboard.html";
      } else {
        // any valid filled input goes here
        window.location.href = "client_dashboard.html";
      }
    });
    const passwordInput = document.getElementById('password');
    const showPassword = document.getElementById('showPassword');
    showPassword.addEventListener('change', function () {
      passwordInput.type = this.checked ? 'text' : 'password';
    });
  </script>

</body>

</html>
