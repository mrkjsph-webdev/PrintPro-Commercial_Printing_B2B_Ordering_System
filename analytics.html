<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Report and Analytics</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


<link href="https://fonts.googleapis.com/css2?family=Mina:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">


<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

<style>
body {
    font-family: 'Poppins', sans-serif;
    background-color: #f5f6fa;
}


.sidebar {
    width: 230px;
    height: 100vh;
    background: #3a3b7b;
    color: white;
    position: fixed;
    padding: 20px;

    display: flex;
    flex-direction: column;
}


.logo {
    font-family: 'Mina', sans-serif;
    font-size: 22px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 40px;
}

.logo img {
    width: 30px;
}


.nav-link {
    color: #ddd;
    margin: 8px 0;
    padding: 10px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.nav-link:hover, .nav-link.active {
    background: #3a3b7b;
    color: white;
}

.material-symbols-outlined {
  font-size: 20px;
}


.logout-btn {
    background: #ff4d4f;
    color: white;
    padding: 10px;
    border-radius: 8px;
    text-align: center;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}

.logout-btn:hover {
    background: #d9363e;
}


.main {
    margin-left: 250px;
    padding: 30px;
}

.card-custom {
    background: white;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}


.pie {
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: conic-gradient(
        #1c7ed6 0% 60%,
        #69db7c 60% 87%,
        #ffa94d 87% 100%
    );
    position: relative;
}

.pie span {
    position: absolute;
    color: white;
    font-weight: 600;
    text-align: center;
}

.label1 { top: 40%; left: 65%; }
.label2 { top: 15%; left: 30%; }
.label3 { top: 47%; left: 10%; }


.stats-box {
    background: #f8f9fa;
    padding: 20px;
    border-radius: 12px;
}

.btn-orange {
    background: #ff7a00;
    color: white;
    border-radius: 10px;
    padding: 12px;
    font-weight: 500;
}

.btn-orange:hover {
    background: #e66a00;
}
</style>

</head>
<body>


<div class="sidebar">

   
    <div>
        <div class="logo">
            <img src="logo.png" alt="logo">
            PrintPro
        </div>

        <nav class="nav flex-column">

            <a class="nav-link" href="#">
                <span class="material-symbols-outlined">home</span>
                Dashboard
            </a>

            <a class="nav-link" href="#">
                <span class="material-symbols-outlined">person</span>
                Users
            </a>

            <a class="nav-link" href="#">
                <span class="material-symbols-outlined">shopping_cart</span>
                Orders
            </a>

            <a class="nav-link" href="#">
                <span class="material-symbols-outlined">package_2</span>
                Inventory
            </a>

            <a class="nav-link active" href="#">
                <span class="material-symbols-outlined">description</span>
                Report and Analytics
            </a>

        </nav>
    </div>

   
    <div class="mt-auto">
        <a href="#" class="logout-btn">
            <span class="material-symbols-outlined">logout</span>
            Logout
        </a>
    </div>

</div>


<div class="main">
    <h3 class="fw-bold mb-4">Report and Analytics</h3>

    <div class="card-custom">
        
        <select class="form-select w-auto mb-3">
            <option>August 1, 2026 - August 31, 2026</option>
        </select>

        <div class="row align-items-center">
            
            <div class="col-md-6 d-flex justify-content-center">
                <div class="pie">
                    <span class="label1">Posters<br>60%</span>
                    <span class="label2">Flyers<br>27%</span>
                    <span class="label3">Postcards<br>13%</span>
                </div>
            </div>

            <div class="col-md-6">
                <div class="stats-box mb-3">
                    <h5 class="fw-bold">Total Orders: 1,500</h5>
                    <p>Posters: 899</p>
                    <p>Flyers: 401</p>
                    <p>Postcards: 200</p>

                    <br>

                    <p>Orders Completed: 1,446</p>
                    <p>Orders Cancelled: 48</p>
                </div>

                <button class="btn btn-orange w-100">
                    GENERATE PDF REPORT
                </button>
            </div>

        </div>
    </div>
</div>

</body>
</html>
