<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory | PrintPro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Mina:wght@700&family=Poppins:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: #f4f5f7;
            display: flex;
            overflow-x: hidden;
        }


        .sidebar {
            width: 240px;
            height: 100vh;
            background: #2b2d77;
            color: white;
            position: fixed;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .logo {
            font-family: 'Mina', sans-serif;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        .nav-link {
            color: white;
            opacity: 0.8;
            margin: 5px 0;
            padding: 12px 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .nav-link.active {
            background: #0085ff;
            opacity: 1;
            font-weight: 500;
        }

        .main-content {
            margin-left: 240px;
            width: 100%;
            padding: 40px;
        }

        /* DITO UNG DASHBOARD STATUS CARDS */
        .status-card {
            border-radius: 12px;
            padding: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 15px;
            border: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        /* DITO NAMAN UNG RECENT ORDERS BOX */
        .order-container {
            background: white;
            border-radius: 15px;
            padding: 25px;
            border: 1px solid #e0e0e0;
        }

        .order-card {
            border: 1px solid #eee;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            transition: 0.2s;
        }

        .order-card:hover {
            background: #fcfcfc;
        }

        .logout-btn {
            background: #ff4d4f;
            color: white;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .logout-btn:hover {
            background: #d9363e;
        }

        /* Modal Styles */
        .modal-body-content {
            padding: 20px;
            /* instead of padding-top only */
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 10px;
            /* optional: controls spacing */
        }

        .modal-footer {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
    </style>
</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <div class="sidebar">
        <div class="logo">
            <img src="images/logo.png" width="30" alt="Logo">
            PrintPro
        </div>

        <nav class="nav flex-column">
            <a href="admin_dashboard.html" class="nav-link">
                <span class="material-symbols-outlined">home</span> Dashboard
            </a>
            <a href="admin_clients.html" class="nav-link">
                <span class="material-symbols-outlined">person</span> Clients
            </a>
            <a href="admin_orders.html" class="nav-link">
                <span class="material-symbols-outlined">shopping_cart</span> Orders
            </a>
            <a href="admin_inventory.html" class="nav-link active">
                <span class="material-symbols-outlined">inventory_2</span> Inventory
            </a>
            <a href="admin_analytics.html" class="nav-link">
                <span class="material-symbols-outlined">analytics</span> Report and Analytics
            </a>
        </nav>

        <div class="mt-auto">
            <a href="login.html" class="logout-btn">
                <span class="material-symbols-outlined">logout</span>
                Logout
            </a>
        </div>
    </div>

    <main class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Inventory</h2>
            <div id="currentTime" class="text-muted small fw-bold"></div>
        </div>

        <div class="order-container shadow-sm">
            <h5 class="fw-bold mb-4">Inventory Items</h5>
            <div class="filter-section">
                <div class="row g-3">
                    <div class="col-md-7">
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0 border-2"><span
                                    class="material-symbols-outlined text-muted">search</span></span>
                            <input type="text" class="form-control border-start-0 border-2 search-input"
                                placeholder="Search by paper size..." id="userSearch">
                        </div>
                    </div>
                    <div class="col-md-5">
                        <select class="form-select border-2 search-input" id="occupationFilter">
                            <option value="">Inventory Items</option>
                            <option value="A4">A4</option>
                            <option value="A3">A3</option>
                            <option value="A3">Letter</option>
                        </select>
                    </div>
                </div>
                <hr class="my-4">
                <div class="order-card d-flex justify-content-between align-items-center">
                    <div class="d-flex gap-3 align-items-center">
                        <img src="images/dashboard/poster-5.png" width="60" class="rounded">
                        <div>
                            <h6 class="mb-0 fw-bold">A4</h6>
                            <small class="text-primary">GSM: 80</small><br>
                        </div>
                    </div>
                    <div class="text-end">
                        <span class="badge text-primary mb-2">In Stock</span><br>
                        <button type="button" class="btn btn-secondary" data-bs-toggle="modal"
                            data-bs-target="#exampleModal">
                            Edit Stocks
                        </button>
                    </div>
                </div>
                <div class="order-card d-flex justify-content-between align-items-center">
                    <div class="d-flex gap-3 align-items-center">
                        <img src="images/dashboard/poster-5.png" width="60" class="rounded">
                        <div>
                            <h6 class="mb-0 fw-bold">A3</h6>
                            <small class="text-primary">GSM: 80</small><br>
                        </div>
                    </div>
                    <div class="text-end">
                        <span class="badge text-primary mb-2">In Stock</span><br>
                        <button type="button" class="btn btn-secondary" data-bs-toggle="modal"
                            data-bs-target="#exampleModal">
                            Edit Stocks
                        </button>
                    </div>
                </div>
                <div class="order-card d-flex justify-content-between align-items-center">
                    <div class="d-flex gap-3 align-items-center">
                        <img src="images/dashboard/poster-5.png" width="60" class="rounded">
                        <div>
                            <h6 class="mb-0 fw-bold">A3</h6>
                            <small class="text-primary">GSM: 100</small><br>
                        </div>
                    </div>
                    <div class="text-end">
                        <span class="badge text-primary mb-2">In Stock</span><br>
                        <button type="button" class="btn btn-secondary" data-bs-toggle="modal"
                            data-bs-target="#exampleModal">
                            Edit Stocks
                        </button>
                    </div>
                </div>
                <div class="order-card d-flex justify-content-between align-items-center">
                    <div class="d-flex gap-3 align-items-center">
                        <img src="images/dashboard/poster-5.png" width="60" class="rounded">
                        <div>
                            <h6 class="mb-0 fw-bold">Letter</h6>
                            <small class="text-primary">GSM: 80</small><br>
                        </div>
                    </div>
                    <div class="text-end">
                        <span class="badge text-primary mb-2">In Stock</span><br>
                        <button type="button" class="btn btn-secondary" data-bs-toggle="modal"
                            data-bs-target="#exampleModal">
                            Edit Stocks
                        </button>
                    </div>
                </div>
            </div>
        </div>
        <!--MODAL EDIT STOCK-->
        <div class="modal fade" id="exampleModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h1 class="modal-title fs-5" id="exampleModalLabel">EDIT STOCK</h1>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body-content">
                        <b> Edit Stocks</b>
                        <label class="mt-2">Stock:</label>
                        <input type="number" class="form-control" value="30">
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-primary">Update Stocks</button>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        function updateTime() {
            const now = new Date();

            const time = now.toLocaleTimeString('en-PH', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: true
            });

            const date = now.toLocaleDateString('en-PH', {
                month: 'long',
                day: 'numeric',
                year: 'numeric'
            });

            document.getElementById("currentTime").textContent = `${time} ${date}`;
        }

        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>

</html>
