<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrintPro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Mina:wght@400;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f5f7;
            padding-top: 55px;
        }

        html,
        body {
            overflow-x: hidden;
        }

        /* NAVBAR */
        nav.navigation {
            position: fixed;
            top: 0;
            left: 0;
            height: 55px;
            width: 100%;
            background-color: #2B307E;
            z-index: 1000;
            /* important */
        }


        .card-btn {
            background-color: #3A3B7B;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            border-radius: 0.75rem;
            width: 100%;
            /* full width inside column */
        }

        nav ul {
            /* Styles for the navigation bar and its items */
            font-weight: 700;
            font-style: normal;
            list-style-type: none;
            margin-top: 0;
            padding: 15px 10px;
        }

        nav ul li a {
            /* Styles for the navigation links */
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 14px 16px;
        }

        nav ul li a:hover {
            /* Hover effect for the navigation links */
            background-color: #3A3B7B;
        }

        nav ul li.list {
            /* Text Alignment and Layout of the Navigation Links. */
            float: right;
        }

        ul li {
            /* Text Styles and Layout of Logo */
            font-family: 'Mina', sans-serif;
            color: white;
            float: left;
        }

        /* PRODUCT */
        .thumbnail-container img {
            width: 100%;
            height: 80px;
            object-fit: contain;
            /* show full image */

            background-color: #fff;
            /* SAME as main */
            padding: 5px;
            /* spacing inside */

            border-radius: 8px;
            border: 1px solid #ddd;

            cursor: pointer;
            transition: 0.2s;
        }

        .thumbnail-container img:hover {
            transform: scale(1.05);
        }

        .thumbnail-container img.active {
            border: 2px solid #2B307E;
        }

        .product-box {
            background: white;
            border-radius: 16px;
            padding: 20px;
        }

        /* ZOOM EFFECT */
        .zoom-container {
            overflow: hidden;
            border-radius: 12px;
        }

        .zoom-container img {
            transition: transform 0.3s ease;
            width: 100%;
        }

        .zoom-container:hover img {
            transform: scale(1.5);
            cursor: zoom-in;
        }

        /* BUTTON */
        .btn-orange {
            background-color: #FF7800;
            border: none;
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 0px #CC6000;
        }

        .btn-orange:hover {
            background: linear-gradient(45deg, #FF7800, #FFB347);
            transform: scale(1.05) translateY(-3px);
            color: white;
            box-shadow: 0 10px 20px rgba(255, 120, 0, 0.4);
        }

        .thumbnail-container img {
            width: 100%;
            height: 80px;
            /* fixed height */
            object-fit: cover;
            /* crop instead of stretch */
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .zoom-container img {
            width: 100%;
            height: 400px;
            /* fixed display height */
            object-fit: contain;
            /* keeps full image visible */
            transition: transform 0.3s ease;
        }

        /* ZOOM CONTAINER */
        .zoom-container {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            cursor: crosshair;
        }

        /* MAIN IMAGE */
        .zoom-container img {
            width: 100%;
            height: 400px;
            object-fit: contain;
        }

        /* ZOOM LENS */
        .zoom-lens {
            position: absolute;
            border: 2px solid #2B307E;
            width: 120px;
            height: 120px;
            background-repeat: no-repeat;
            display: none;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <!-- NAV -->
    <header>
        <nav class="navigation">
            <ul class="d-flex align-items-center w-100">
                <!-- Logo -->
                <li class="me-2">
                    <img src="image_resources/logo.png" alt="Logo" style="max-width: 24px; max-height: 24px;">
                </li>

                <!-- Company Logo -->
                <li class="me-auto">PrintPro</li>

                <!-- Cart icon -->
                <li class="list">
                    <a href="cart.html"><img src="image_resources/shopping_cart.png" alt="Cart"></a>
                </li>

                <!-- Menu dropdown -->
                <li class="dropdown list">
                    <a href="#" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <img src="image_resources/menu-btn.png" alt="Menu">
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <a class="dropdown-item d-flex align-items-center gap-2" href="login.html">
                                <img src="image_resources/logout-btn.png" alt="Logout" height="16">
                                Logout
                            </a>
                        </li>
                    </ul>
                </li>
            </ul>
        </nav>
    </header>

    <!-- MAIN -->
    <main class="container-fluid px-4">
        <div class="row g-4 py-5">

            <!-- LEFT -->
            <div class="col-md-7">
                <div class="row g-3">

                    <!-- THUMBNAILS -->
                    <div class="col-2">
                        <div class="d-flex flex-column gap-3 thumbnail-container">
                            <img src="image_resources/poster/poster-2.webp" class="active" onclick="changeImage(this)">
                            <img src="image_resources/poster/poster-3.webp" onclick="changeImage(this)">
                            <img src="image_resources/poster/poster-4.webp" onclick="changeImage(this)">
                            <img src="image_resources/poster/poster-5.png" onclick="changeImage(this)">
                        </div>
                    </div>

                    <!-- MAIN IMAGE -->
                    <div class="col-10">
                        <div class="product-box shadow-sm">
                            <div class="zoom-container" id="zoomContainer">
                                <img src="image_resources/poster/poster-2.webp" id="mainView">
                                <div class="zoom-lens" id="zoomLens"></div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>

            <!-- RIGHT -->
            <div class="col-md-5">
                <h1 class="display-5 fw-800 text-primary mb-3"><strong>Posters</strong></h1>
                <p class="text-muted lead font-mina mb-4" style="font-weight: 300;">
                    Make a big statement with our high-resolution, full-color custom posters. 
                </p>
                <hr class="my-4 opacity-50">
                <div class="d-flex gap-3 p-3 mb-4 bg-white rounded shadow-sm">
                    <img src="image_resources/box.png" width="35" height="35">
                    <div>
                        <p class="fw-bold mb-0">Pickup Delivery Only</p>
                        <p class="small text-muted mb-0">
                            Orders must be picked up at the store when order is completed.
                        </p>
                    </div>
                </div>

                <a href="product_customize.html" class="btn btn-orange w-100 py-3 fs-5">
                    Customize this Product
                </a>
            </div>

        </div>
    </main>

    <!-- SCRIPT -->
    <script>
        function changeImage(el) {
            let main = document.getElementById("mainView");
            main.src = el.src;

            // remove active
            document.querySelectorAll(".thumbnail-container img")
                .forEach(img => img.classList.remove("active"));

            el.classList.add("active");
        }
        const container = document.getElementById('zoomContainer');
        const img = document.getElementById('mainView');

        container.addEventListener('mousemove', (e) => {
            const { left, top, width, height } = container.getBoundingClientRect();
            // Calculate mouse position as a percentage
            const x = ((e.pageX - left - window.scrollX) / width) * 100;
            const y = ((e.pageY - top - window.scrollY) / height) * 100;

            img.style.transformOrigin = `${x}% ${y}%`;
        });

        // Reset zoom center when mouse leaves
        container.addEventListener('mouseleave', () => {
            img.style.transformOrigin = 'center center';
        });
    </script>

</body>

</html>
